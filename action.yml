name: client-creep
description: Analyze Next.js client component boundaries — find accidental creep and bundle cost
author: DhruvilChauahan0210

branding:
  icon: zap
  color: yellow

inputs:
  dir:
    description: Path to the Next.js project (relative to repo root)
    required: false
    default: "."
  budget:
    description: Fail if estimated client JS exceeds this KB threshold
    required: false
    default: ""
  ci:
    description: Fail if any accidental creep candidates are detected
    required: false
    default: "true"
  version:
    description: Version of client-creep to use
    required: false
    default: "latest"
  comment:
    description: Post a summary comment on pull requests
    required: false
    default: "true"
  push:
    description: Push results to the client-creep dashboard
    required: false
    default: "false"
  token:
    description: Supabase access token for pushing to the dashboard
    required: false
    default: ""
  dashboard:
    description: Dashboard URL (default is the hosted dashboard)
    required: false
    default: ""

outputs:
  client-components:
    description: Number of client components found
  boundaries:
    description: Number of use-client boundaries found
  creep-candidates:
    description: Number of accidental creep candidates
  estimated-kb:
    description: Estimated client JS in KB
  recoverable-kb:
    description: Estimated recoverable KB from creep candidates

runs:
  using: composite
  steps:
    - name: Run client-creep on PR branch
      id: run-cc
      shell: bash
      run: |
        ARGS="${{ inputs.dir }}"
        if [ -n "${{ inputs.budget }}" ]; then
          ARGS="$ARGS --budget ${{ inputs.budget }}"
        fi
        if [ "${{ inputs.push }}" = "true" ] && [ -n "${{ inputs.token }}" ]; then
          ARGS="$ARGS --push --token ${{ inputs.token }}"
        fi
        if [ -n "${{ inputs.dashboard }}" ]; then
          ARGS="$ARGS --dashboard ${{ inputs.dashboard }}"
        fi

        CC_JSON_FILE="$RUNNER_TEMP/client-creep-output.json"

        # Save JSON output to temp file for PR comment and output parsing
        npx --yes client-creep@${{ inputs.version }} $ARGS --json > "$CC_JSON_FILE" 2>/dev/null || true

        # Show human-readable output in the Actions log
        npx --yes client-creep@${{ inputs.version }} $ARGS || true

        # Set step outputs from the JSON file
        if [ -f "$CC_JSON_FILE" ]; then
          node -e "
            const d = JSON.parse(require('fs').readFileSync('$CC_JSON_FILE', 'utf-8'));
            const s = d.summary;
            const out = process.env.GITHUB_OUTPUT;
            const fs = require('fs');
            fs.appendFileSync(out, 'client-components=' + s.clientComponents + '\n');
            fs.appendFileSync(out, 'boundaries=' + s.clientBoundaries + '\n');
            fs.appendFileSync(out, 'creep-candidates=' + s.creepCandidates + '\n');
            fs.appendFileSync(out, 'estimated-kb=' + (s.estimatedClientBytes / 1024).toFixed(0) + '\n');
            fs.appendFileSync(out, 'recoverable-kb=' + (s.recoverableBytes / 1024).toFixed(0) + '\n');
          " 2>/dev/null || true
        fi

        # Re-run with CI flags to respect exit code
        if [ "${{ inputs.ci }}" = "true" ]; then
          npx --yes client-creep@${{ inputs.version }} $ARGS --ci --json > /dev/null 2>&1
        fi

    - name: Run client-creep on base branch (for diff)
      if: ${{ github.event_name == 'pull_request' && inputs.comment == 'true' }}
      shell: bash
      run: |
        CC_BASE_JSON="$RUNNER_TEMP/client-creep-base.json"
        WORKTREE_DIR="$RUNNER_TEMP/cc-base-worktree"

        git fetch origin ${{ github.base_ref }} --depth=1 2>/dev/null || true
        git worktree add "$WORKTREE_DIR" origin/${{ github.base_ref }} 2>/dev/null || true

        if [ -d "$WORKTREE_DIR" ]; then
          npx --yes client-creep@${{ inputs.version }} "$WORKTREE_DIR/${{ inputs.dir }}" --json > "$CC_BASE_JSON" 2>/dev/null || true
          git worktree remove "$WORKTREE_DIR" --force 2>/dev/null || true
        fi

    - name: Comment on PR
      if: ${{ github.event_name == 'pull_request' && inputs.comment == 'true' }}
      uses: actions/github-script@v7
      with:
        github-token: ${{ github.token }}
        script: |
          const fs = require('fs');
          const jsonFile = process.env.RUNNER_TEMP + '/client-creep-output.json';
          const baseJsonFile = process.env.RUNNER_TEMP + '/client-creep-base.json';

          let data = {};
          try { data = JSON.parse(fs.readFileSync(jsonFile, 'utf-8')); } catch {
            console.log('client-creep: could not read JSON output, skipping PR comment');
            return;
          }

          let baseData = null;
          try { baseData = JSON.parse(fs.readFileSync(baseJsonFile, 'utf-8')); } catch {}

          const s = data.summary ?? {};
          const b = baseData?.summary ?? null;

          const creepCount = s.creepCandidates ?? 0;
          const estimatedKb = ((s.estimatedClientBytes ?? 0) / 1024).toFixed(0);
          const recoverableKb = ((s.recoverableBytes ?? 0) / 1024).toFixed(0);
          const statusIcon = creepCount > 0 ? '⚠️' : '✅';

          function delta(curr, prev, lowerIsBetter = true) {
            if (prev == null) return '';
            const d = curr - prev;
            if (d === 0) return ' *(no change)*';
            const sign = d > 0 ? '+' : '';
            const color = (lowerIsBetter ? d > 0 : d < 0) ? '🔴' : '🟢';
            return ` ${color} \`${sign}${d}\``;
          }

          const rows = [
            `| Client components | ${s.clientComponents ?? 0}${delta(s.clientComponents, b?.clientComponents, false)} |`,
            `| \`"use client"\` boundaries | ${s.clientBoundaries ?? 0}${delta(s.clientBoundaries, b?.clientBoundaries)} |`,
            `| Accidental creep candidates | ${creepCount}${delta(creepCount, b?.creepCandidates)} |`,
            `| Estimated client JS | ${estimatedKb} KB${delta(Number(estimatedKb), b ? (b.estimatedClientBytes / 1024) : null)} |`,
            `| Potentially recoverable | ${recoverableKb} KB |`,
          ];

          const diffNote = b
            ? `*Compared against \`${{ github.base_ref }}\`.*`
            : '';

          const body = [
            `## ${statusIcon} client-creep report`,
            '',
            '| Metric | Value |',
            '|---|---|',
            ...rows,
            '',
            creepCount > 0
              ? `> **${creepCount} component(s)** are client by accident — run \`npx client-creep\` locally to see the import chains and recover **${recoverableKb} KB**.`
              : '> No accidental client creep detected. ✨',
            '',
            diffNote,
            '',
            '<!-- client-creep-comment -->',
          ].filter(l => l !== undefined).join('\n');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body && c.body.includes('<!-- client-creep-comment -->'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
